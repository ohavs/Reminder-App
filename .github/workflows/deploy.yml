name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      # Requires the service account to have the "Firebase Rules Admin" +
      # "Service Usage Consumer" IAM roles; warns instead of failing without them.
      - name: Deploy Firestore rules
        continue-on-error: true
        run: |
          set -o pipefail
          echo "$FIREBASE_SA" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy \
            --only firestore:rules --project reminder-app-eeb53 --non-interactive 2>&1 | tee rules.log || {
            echo "::warning::Firestore rules deploy failed — grant the CI service account the Firebase Rules Admin role, or paste firestore.rules manually in the console"
            rm /tmp/sa.json
            exit 1
          }
          rm /tmp/sa.json
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Deploy Hosting via the Firebase CLI. A flaky network "premature close"
      # makes firebase-tools retry the final release POST; the first attempt
      # already succeeded server-side, so the retry returns 400 "supplied
      # version ... is the current active version". The site IS deployed in
      # that case, so we treat that specific error as success.
      - name: Deploy Hosting
        run: |
          echo "$FIREBASE_SA" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          set +e
          out=$(npx firebase-tools deploy --only hosting \
            --project reminder-app-eeb53 --non-interactive 2>&1)
          code=$?
          echo "$out"
          rm -f /tmp/sa.json
          if [ $code -ne 0 ]; then
            if echo "$out" | grep -q "is the current active version"; then
              echo "::warning::Hosting release retry race — treating as success; the verify step below is authoritative."
            else
              exit $code
            fi
          fi
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Authoritative check: the live site must serve the asset hash we just
      # built. This turns the ambiguous release step into a verified deploy.
      - name: Verify hosting is live
        run: |
          EXPECTED=$(grep -oE 'assets/index-[A-Za-z0-9_]+\.js' dist/index.html | head -1)
          echo "expected asset: $EXPECTED"
          for i in 1 2 3 4 5 6; do
            LIVE=$(curl -fsS "https://reminder-app-eeb53.web.app/?cb=$RANDOM$i" 2>/dev/null | grep -oE 'assets/index-[A-Za-z0-9_]+\.js' | head -1)
            echo "live[$i]: $LIVE"
            if [ "$LIVE" = "$EXPECTED" ]; then echo "✅ hosting serves the new build"; exit 0; fi
            sleep 8
          done
          echo "::error::Hosting is still serving an OLD build ($LIVE) after deploy — expected $EXPECTED. The release did not take effect."
          exit 1
