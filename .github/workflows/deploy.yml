name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      # Requires the service account to have the "Firebase Rules Admin" +
      # "Service Usage Consumer" IAM roles; warns instead of failing without them.
      - name: Deploy Firestore rules
        continue-on-error: true
        run: |
          set -o pipefail
          echo "$FIREBASE_SA" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy \
            --only firestore:rules --project reminder-app-eeb53 --non-interactive 2>&1 | tee rules.log || {
            echo "::warning::Firestore rules deploy failed — grant the CI service account the Firebase Rules Admin role, or paste firestore.rules manually in the console"
            rm /tmp/sa.json
            exit 1
          }
          rm /tmp/sa.json
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # Deploy Hosting via the Firebase CLI directly. The FirebaseExtended
      # action occasionally false-fails on a retry race ("supplied version is
      # the current active version") even though the deploy succeeded.
      - name: Deploy Hosting
        run: |
          set -o pipefail
          echo "$FIREBASE_SA" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy \
            --only hosting --project reminder-app-eeb53 --non-interactive
          rm /tmp/sa.json
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
