name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Sync Capacitor
        run: |
          set -o pipefail
          npx cap sync android 2>&1 | tee sync.log || {
            while IFS= read -r line; do echo "::error::sync: $line"; done < <(tail -10 sync.log)
            exit 1
          }

      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee gradle.log || {
            while IFS= read -r line; do echo "::error::gradle: $line"; done < <(grep -E "error:|FAILURE|Caused by" gradle.log | head -10)
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-reminders-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
