name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit count → versionCode is monotonic

      - name: Compute version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "APP_VERSION_CODE=$COUNT" >> "$GITHUB_ENV"
          echo "APP_VERSION_NAME=1.1.$COUNT" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Sync Capacitor
        run: |
          set -o pipefail
          npx cap sync android 2>&1 | tee sync.log || {
            while IFS= read -r line; do echo "::error::sync: $line"; done < <(tail -10 sync.log)
            exit 1
          }

      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon \
            -PappVersionCode=$APP_VERSION_CODE -PappVersionName=$APP_VERSION_NAME 2>&1 | tee gradle.log || {
            while IFS= read -r line; do echo "::error::gradle: $line"; done < <(grep -E "error:|FAILURE|Caused by" gradle.log | head -10)
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra-reminders-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ultra-reminders.apk

      - name: Write update manifest
        run: |
          cat > update.json <<EOF
          {
            "versionCode": ${APP_VERSION_CODE},
            "versionName": "${APP_VERSION_NAME}",
            "url": "https://github.com/ohavs/Reminder-App/releases/download/latest/ultra-reminders.apk",
            "notes": "גרסה ${APP_VERSION_NAME} זמינה"
          }
          EOF
          cat update.json

      - name: Publish "latest" release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "ULTRA תזכורות — גרסה אחרונה"
          body: "APK עדכני שנבנה אוטומטית מה-main. הורד את ultra-reminders.apk והתקן."
          prerelease: true
          files: |
            ultra-reminders.apk
            update.json
