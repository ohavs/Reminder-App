<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ULTRA · תזכורות</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@400;500;600;700;800&family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&display=swap" rel="stylesheet" />

<style>
  :root {
    --font-display: 'Rubik', system-ui, sans-serif;
    --font-body: 'Heebo', system-ui, sans-serif;
    --rs: 1;            /* radius scale multiplier (tweakable) */
    --r-xs: calc(12px * var(--rs));
    --r-sm: calc(16px * var(--rs));
    --r-md: calc(22px * var(--rs));
    --r-lg: calc(28px * var(--rs));
    --r-xl: calc(34px * var(--rs));
    --r-pill: 999px;
    --ease: cubic-bezier(0.2, 0, 0, 1);
    --ease-spring: cubic-bezier(0.34, 1.3, 0.5, 1);
    /* layered claymorphic shadows */
    --sh-1: 0 1px 2px rgba(70,45,20,.05), 0 6px 16px -8px rgba(70,45,20,.14);
    --sh-2: 0 2px 6px rgba(70,45,20,.06), 0 14px 34px -12px rgba(70,45,20,.22);
    --sh-3: 0 4px 10px rgba(70,45,20,.08), 0 26px 60px -16px rgba(70,45,20,.30);
    --clay-hi: inset 0 2px 3px rgba(255,255,255,.55);
  }
  [data-dark="true"] {
    --sh-1: 0 1px 2px rgba(0,0,0,.35), 0 6px 16px -8px rgba(0,0,0,.5);
    --sh-2: 0 2px 6px rgba(0,0,0,.4), 0 14px 34px -12px rgba(0,0,0,.6);
    --sh-3: 0 4px 10px rgba(0,0,0,.45), 0 26px 60px -16px rgba(0,0,0,.7);
    --clay-hi: inset 0 1px 2px rgba(255,255,255,.10);
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #0c0c0e;
    font-family: var(--font-body);
    display: grid;
    place-items: center;
    overflow: hidden;
  }

  /* ambient backdrop behind the clean screen */
  #stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background:
      radial-gradient(60% 50% at 30% 20%, color-mix(in oklab, var(--md-primary, #B5651D) 30%, #15151a), #0c0c0e 70%),
      radial-gradient(50% 50% at 80% 90%, color-mix(in oklab, var(--md-tertiary, #B5651D) 25%, #15151a), #0c0c0e 70%);
  }

  .ultra-root {
    position: relative;
    width: min(440px, 100vw);
    height: 100dvh;
    background: var(--md-surface, #fff);
    color: var(--md-on-surface, #111);
    overflow: hidden;
    border-radius: 0;
    transition: background .4s var(--ease), color .4s var(--ease);
  }
  @media (min-width: 480px) {
    .ultra-root {
      border-radius: 34px;
      box-shadow: 0 40px 90px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.05);
      height: min(940px, 96vh);
    }
  }

  .screen-pad { padding: 16px 20px 28px; min-height: 100%; }
  .scroll-area::-webkit-scrollbar { width: 0; }
  .hide-scroll::-webkit-scrollbar { height: 0; }

  .msym {
    font-family: 'Material Symbols Rounded';
    font-weight: normal; font-style: normal;
    line-height: 1; letter-spacing: normal; text-transform: none;
    display: inline-block; white-space: nowrap; direction: ltr;
    -webkit-font-feature-settings: 'liga';
    font-variation-settings: 'opsz' 24;
    user-select: none;
  }

  /* ---- ripple ---- */
  .ripple-host { position: relative; }
  .ripple {
    position: absolute; border-radius: 50%; transform: scale(0);
    background: currentColor; opacity: .18; pointer-events: none;
    animation: ripple .55s var(--ease);
  }
  @keyframes ripple { to { transform: scale(1); opacity: 0; } }
  .pressable { transition: transform .12s var(--ease); }
  .pressable:active { transform: scale(.985); }

  /* ---- entrance animations ---- */
  @media (prefers-reduced-motion: no-preference) {
    .screen-enter { animation: screenEnter .42s var(--ease) both; }
    @keyframes screenEnter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
    .reveal { animation: reveal .5s var(--ease-spring) both; }
    @keyframes reveal {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: none; }
    }
    .bar-grow { animation: barGrow .7s var(--ease-spring) both; transform-origin: bottom; }
    @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    .ring-grow { animation: ringGrow 1.1s var(--ease-spring) both; }
    @keyframes ringGrow { from { stroke-dashoffset: var(--ring-c); } to { stroke-dashoffset: var(--ring-off); } }
    .bar-grow-x { animation: barGrowX .8s var(--ease-spring) both; transform-origin: inline-start; }
    @keyframes barGrowX { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .onb-illo { animation: onbIllo .6s var(--ease-spring) both; }
    @keyframes onbIllo { from { opacity: 0; transform: scale(.7) translateY(20px); } to { opacity: 1; transform: none; } }
    .onb-text { animation: reveal .5s var(--ease-spring) both; animation-delay: .12s; }
    .toast-in { animation: toastIn .4s var(--ease-spring) both; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(.9); } to { opacity: 1; transform: none; } }
    .fab-pulse { animation: fabPulse .5s var(--ease-spring) both; }
    @keyframes fabPulse { from { transform: scale(.5) translateY(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  }

  /* time input prettifying */
  input[type=time]::-webkit-calendar-picker-indicator { filter: invert(0); opacity: .5; }
  input[data-dark] { color-scheme: dark; }

  /* hue slider thumb */
  .hue-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
    background: #fff; border: 3px solid rgba(0,0,0,.15); cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  ::placeholder { color: var(--md-on-surface-variant); opacity: .6; }
</style>
</head>
<body>
<div id="stage">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</html>
